<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Financial Models Challenge</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        :root {
            --primary: #2d5a5a;
            --secondary: #f0f7ff;
            --accent: #d1e8e2;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text);
            max-width: 850px;
            margin: 20px auto;
            padding: 20px;
            background-color: #f9f9f9;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h2 { color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-top: 0; }

        .scenario-card {
            background: #fff;
            border: 2px solid var(--primary);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
        }

        /* --- Custom Dropdown Styling --- */
        .custom-select-wrapper {
            position: relative;
            user-select: none;
            width: 100%;
            margin: 15px 0;
        }

        .select-trigger {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #fff;
            border: 2px solid #ccc;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1em;
        }

        .select-trigger:after {
            content: '▼';
            font-size: 0.7em;
            margin-left: 10px;
            color: var(--primary);
        }

        .custom-options {
            position: absolute;
            display: none;
            top: 100%;
            left: 0;
            right: 0;
            background: #fff;
            border: 2px solid var(--primary);
            border-top: none;
            border-radius: 0 0 8px 8px;
            z-index: 100;
            max-height: 480px;
            overflow-y: auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .custom-options.open { display: block; }

        .custom-option {
            padding: 20px 15px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }

        .custom-option:hover { background: var(--secondary); }

        .custom-option .model-name {
            font-weight: bold;
            font-size: 1.05em;
            margin-bottom: 10px;
            color: var(--primary);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
        }

        .feedback {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            display: none;
            font-weight: bold;
        }

        .feedback.correct { background: #d4edda; color: #155724; display: block; }
        .feedback.wrong { background: #f8d7da; color: #721c24; display: block; }
