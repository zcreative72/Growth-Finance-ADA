<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Financial Models Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f8fafc; color: #0f172a; }
        .focus-ring:focus { outline: 3px solid #4338ca; outline-offset: 2px; }
        math { font-size: 1.35rem; color: #1e1b4b; }
        .btn-primary { background-color: #1e1b4b; color: #ffffff; border: 2px solid #1e1b4b; transition: all 0.2s; }
        .btn-primary:hover:not(:disabled) { background-color: #312e81; transform: translateY(-1px); }
        .btn-primary:disabled { background-color: #94a3b8; border-color: #94a3b8; cursor: not-allowed; }
        .card { border: 1px solid #e2e8f0; transition: border-color 0.3s; }
        .card-correct { border: 2px solid #059669; background-color: #f0fdf4; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 border-b border-slate-200 pb-6">
            <h1 class="text-3xl font-extrabold text-indigo-950 mb-2">Financial Models: Accessible Edition</h1>
            <p class="text-slate-600 text-lg mb-4">Identify the correct mathematical model for each financial scenario.</p>
            
            <div class="flex flex-wrap gap-8 py-4 bg-white px-6 rounded-xl shadow-sm border border-slate-100" aria-live="polite">
                <div><span class="text-slate-500 uppercase text-xs font-bold tracking-wider block">Progress</span> Round <span id="round-val" class="text-xl font-bold">1</span> of 4</div>
                <div><span class="text-slate-500 uppercase text-xs font-bold tracking-wider block">Accuracy</span> <span id="acc-val" class="text-xl font-bold text-indigo-700">100%</span></div>
                <div><span class="text-slate-500 uppercase text-xs font-bold tracking-wider block">Attempts</span> <span id="att-val" class="text-xl font-bold text-slate-700">0</span></div>
            </div>
        </header>

        <main id="game-container" class="space-y-6">
            </main>

        <div id="announcer" class="sr-only" aria-live="assertive"></div>

        <div id="modal" class="fixed inset-0 bg-slate-900/90 flex items-center justify-center hidden px-4" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="bg-white p-8 rounded-2xl max-w-sm w-full text-center shadow-2xl">
                <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>
                </div>
                <h2 id="modal-title" class="text-2xl font-bold text-slate-900 mb-2">Round Complete!</h2>
                <p id="modal-desc" class="text-slate-600 mb-6">Great job. Ready for the next set of challenges?</p>
                <button id="next-btn" class="w-full py-4 btn-primary rounded-xl font-bold text-lg focus-ring shadow-lg">Continue to Round 2</button>
            </div>
        </div>
    </div>

<script>
const categories = [
    { id: 'linear', name: 'Linear Growth', math: `<math display="block"><msub><mi>P</mi><mi>n</mi></msub><mo>=</mo><msub><mi>P</mi><mn>0</mn></msub><mo>+</mo><mi>d</mi><mi>n</mi></math>` },
    { id: 'exponential', name: 'Exponential Growth', math: `<math display="block"><msub><mi>P</mi><mi>n</mi></msub><mo>=</mo><msub><mi>P</mi><mn>0</mn></msub><msup><mrow><mo>(</mo><mn>1</mn><mo>+</mo><mi>r</mi><mo>)</mo></mrow><mi>n</mi></msup></math>` },
    { id: 'logistic', name: 'Logistic Growth', math: `<math display="block"><msub><mi>P</mi><mi>n</mi></msub><mo>=</mo><msub><mi>P</mi><mrow><mi>n</mi><mo>-</mo><mn>1</mn></mrow></msub><mo>+</mo><mi>r</mi><mo>(</mo><mn>1</mn><mo>-</mo><mfrac><msub><mi>P</mi><mrow><mi>n</mi><mo>-</mo><mn>1</mn></mrow></msub><mi>K</mi></mfrac><mo>)</mo><msub><mi>P</mi><mrow><mi>n</mi><mo>-</mo><mn>1</mn></mrow></msub></math>` },
    { id: 'compound', name: 'Compound Interest', math: `<math display="block"><mi>A</mi><mo>=</mo><mi>P</mi><msup><mrow><mo>(</mo><mn>1</mn><mo>+</mo><mfrac><mi>r</mi><mi>k</mi></mfrac><mo>)</mo></mrow><mrow><mi>n</mi><mi>k</mi></mrow></msup></math>` },
    { id: 'savings', name: 'Savings Annuity', math: `<math display="block"><mi>A</mi><mo>=</mo><mfrac><mrow><mi>d</mi><mo>[</mo><msup><mrow><mo>(</mo><mn>1</mn><mo>+</mo><mi>r</mi><mo>/</mo><mi>k</mi><mo>)</mo></mrow><mrow><mi>n</mi><mi>k</mi></mrow></msup><mo>-</mo><mn>1</mn><mo>]</mo></mrow><mrow><mo>(</mo><mi>r</mi><mo>/</mo><mi>k</mi><mo>)</mo></mrow></mfrac></math>` },
    { id: 'payout', name: 'Payout/Loan Annuity', math: `<math display="block"><msub><mi>P</mi><mn>0</mn></msub><mo>=</mo><mfrac><mrow><mi>d</mi><mo>[</mo><mn>1</mn><mo>-</mo><msup><mrow><mo>(</mo><mn>1</mn><mo>+</mo><mi>r</mi><mo>/</mo><mi>k</mi><mo>)</mo></mrow><mrow><mo>-</mo><mi>n</mi><mi>k</mi></mrow></msup><mo>]</mo></mrow><mrow><mo>(</mo><mi>r</mi><mo>/</mo><mi>k</mi><mo>)</mo></mrow></mfrac></math>` }
];

const allItems = [
    // Round 1
    { text: "A rental car company charges $45 plus 25 cents per each mile driven.", cat: 'linear' },
    { text: "Suppose you have $7400 deposited at 2.85% compounded quarterly. About how long will it take to reach $9300?", cat: 'compound' },
    { text: "Suppose inflation decreases the value of money by 4% each year. How much will $100 buy in 25 years?", cat: 'exponential' },
    { text: "A population of fish in a pond is growing by 12% a year, but the pond can only support 1000 fish.", cat: 'logistic' },
    // Round 2
    { text: "You deposit $2000 each year into an account earning 6% interest. How much will you have in 15 years?", cat: 'savings' },
    { text: "You want to take out a $250,000 mortgage at 4.5% interest for 30 years. What are your monthly payments?", cat: 'payout' },
    { text: "A gym membership costs $20 to join and $15 per month.", cat: 'linear' },
    { text: "The number of bacteria in a petri dish doubles every 3 hours.", cat: 'exponential' },
    // Round 3
    { text: "You win the lottery and want to receive $50,000 a year for the next 20 years from an account earning 5%.", cat: 'payout' },
    { text: "A tree grows 1.5 feet every year.", cat: 'linear' },
    { text: "An investment of $10,000 earns 8% interest compounded monthly.", cat: 'compound' },
    { text: "You put $100 monthly into an IRA for 40 years.", cat: 'savings' },
    // Round 4
    { text: "A virus is spreading in a small town. The infection rate slows as more people become immune.", cat: 'logistic' },
    { text: "The value of a car depreciates by 15% each year.", cat: 'exponential' },
    { text: "A student loan of $30,000 is being paid back over 10 years at 6% interest.", cat: 'payout' },
    { text: "A savings account earns 0.5% interest compounded annually.", cat: 'compound' }
];

let round = 1, att = 0, corr = 0;

function renderRound() {
    const container = document.getElementById('game-container');
    container.innerHTML = '';
    const roundItems = allItems.slice((round-1)*4, round*4);

    roundItems.forEach((item, index) => {
        const section = document.createElement('div');
        section.className = "card bg-white p-6 rounded-2xl shadow-sm space-y-4";
        section.id = `card-${index}`;
        section.innerHTML = `
            <p class="text-xl font-semibold text-slate-800" id="q-${index}">${item.text}</p>
            <div class="flex flex-col md:flex-row gap-4 items-center">
                <div class="w-full md:w-auto flex-grow">
                    <label for="select-${index}" class="sr-only">Select financial model</label>
                    <select id="select-${index}" class="focus-ring border-2 border-slate-200 p-3 rounded-xl bg-slate-50 w-full text-slate-900 font-medium">
                        <option value="">-- Choose the Correct Model --</option>
                        ${categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
                    </select>
                </div>
                <button onclick="check(${index}, '${item.cat}')" id="btn-${index}" class="btn-primary px-8 py-3 rounded-xl font-bold focus-ring whitespace-nowrap w-full md:w-auto">Check Answer</button>
            </div>
            <div id="feedback-${index}" class="font-bold flex items-center gap-2" aria-live="polite"></div>
            <div id="formula-${index}" class="mt-4 p-5 bg-indigo-50 rounded-xl hidden border border-indigo-100 shadow-inner">
                <span class="text-xs uppercase font-black text-indigo-400 tracking-widest block mb-3">Mathematical Model</span>
                <div class="flex justify-center items-center py-2"></div>
            </div>
        `;
        container.appendChild(section);
    });
    window.scrollTo(0,0);
}

window.check = (idx, correctCat) => {
    const sel = document.getElementById(`select-${idx}`);
    const feed = document.getElementById(`feedback-${idx}`);
    const form = document.getElementById(`formula-${idx}`);
    const btn = document.getElementById(`btn-${idx}`);
    const card = document.getElementById(`card-${idx}`);
    const announcer = document.getElementById('announcer');
    
    if(!sel.value) return;

    att++;
    if(sel.value === correctCat) {
        corr++;
        card.classList.add('card-correct');
        feed.innerHTML = `<span class="text-emerald-700 text-lg">✓ Correct: ${categories.find(c => c.id === correctCat).name}</span>`;
        announcer.textContent = "Correct! The mathematical model has been revealed.";
        
        // Render MathML
        const catObj = categories.find(c => c.id === correctCat);
        form.querySelector('div').innerHTML = catObj.math;
        form.classList.remove('hidden');
        
        sel.disabled = true;
        btn.disabled = true;
        checkRoundEnd();
    } else {
        feed.innerHTML = `<span class="text-rose-700">✕ Incorrect. Try a different model.</span>`;
        announcer.textContent = "Incorrect answer. Please try again.";
    }
    updateStats();
};

function updateStats() {
    document.getElementById('att-val').innerText = att;
    document.getElementById('acc-val').innerText = Math.round((corr/att)*100) + '%';
}

function checkRoundEnd() {
    const totalCorrectInRound = document.querySelectorAll('select:disabled').length;
    if(totalCorrectInRound === 4) {
        setTimeout(() => {
            const modal = document.getElementById('modal');
            const nextBtn = document.getElementById('next-btn');
            if(round === 4) {
                document.getElementById('modal-title').innerText = "Course Mastered!";
                document.getElementById('modal-desc').innerText = `Final Accuracy: ${document.getElementById('acc-val').innerText}`;
                nextBtn.innerText = "Restart Challenge";
            } else {
                nextBtn.innerText = `Start Round ${round + 1}`;
            }
            modal.classList.remove('hidden');
            nextBtn.focus();
        }, 800);
    }
}

document.getElementById('next-btn').onclick = () => {
    if(round < 4) {
        round++;
        document.getElementById('round-val').innerText = round;
        document.getElementById('modal').classList.add('hidden');
        renderRound();
    } else {
        location.reload();
    }
};

// Initial Render
renderRound();
</script>
</body>
</html>
